name: Update Data

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:  # Manuell auslösbar (z. B. für Tests)

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Schreibrechte für das Repository
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install requests

      - name: Run Python script
        run: python fetch-data.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add ./data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Automatische Aktualisierung der Daten $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
